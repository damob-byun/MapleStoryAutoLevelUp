# ====== 기본 설정 (Default Configuration) ======
# 아래 파라미터를 직접 수정하지 마세요.
# 본인 설정은 config_edit_me.yaml 에 따로 작성하세요.
# --------------------------------------

bot:
  # 🔁 봇 설정
  mode: "normal"        # 선택지: "normal" "aux" "patrol"
  attack: "directional" # 선택지: "aoe_skill" "directional"
  map: "" # config/config_data.yaml 참고

key:
  # 🎮 키보드 매핑
  # 게임 내 키 설정에 맞게 조정하세요.
  #
  # 예시:
  #   - "q":      Q 키
  #   - "space":  스페이스바
  #   - "1":      숫자 키 1
  #   - "ctrl":   컨트롤 키
  #   - "alt":    Alt 키
  #   - "shift":  Shift 키
  aoe_skill: "q"            # 💥 광역 스킬 (예: 클레릭의 힐, 마법사의 라이트닝)
  directional_attack: "w"   # ⚔️ 기본 방향 공격 (예: 매직 클로, 표창 던지기)
  teleport: "e"             # 🌀 텔레포트 스킬. 사용 불가하면 "" 로 설정
  jump: "space"             # 🦘 점프 키
  add_hp: "1"               # ❤️ HP 포션 사용. 자동 회복 끄려면 "" 로 설정
  add_mp: "2"               # 💧 MP 포션 사용. 자동 MP 끄려면 "" 로 설정
  return_home: "home"       # 🔁 귀환 주문서 사용 키
  party: "p"                # ⌨️ 파티창 단축키

buff_skill:
  # 💫 버프 스킬
  # 쿨다운이 끝나면 자동으로 버프 스킬을 사용합니다.
  # 버프 스킬 예: 마법사의 매직 가드, 클레릭의 엔젤 블레스, 도적의 스피드 부스트
  # ⚠️ 참고: 버프를 대신 걸어주는 펫이 있다면 무시해도 됩니다.
  keys: []                # ⌨️ 각 버프 스킬을 사용할 키 목록 (예: ["a", "s"])
  cooldown: []            # ⏱️ 쿨다운(초). `keys` 순서와 일치
  action_cooldown: 1      # 🕒 버프 후 다음 동작까지의 지연(초)

directional_attack:
  # 🗡️ 방향 공격
  # 방향 공격은 캐릭터 좌/우 방향으로만 공격하는 기본 공격/스킬입니다.
  # 예: 마법사의 매직 클로, 도적의 표창 던지기, 달팽이 껍데기 던지기 등.
  range_x: 350               # ↔️ 가로 공격 범위 (픽셀)
  range_y: 70                # ↕️ 세로 공격 범위 (픽셀)
  cooldown: 0.9              # ⏱️ 공격 간 시간 간격 (초)
  character_turn_delay: 0.02 # 🔄 방향 전환 후 공격까지의 지연 (초)

aoe_skill:
  # 💥 광역 스킬 (AoE)
  # AoE(범위) 스킬은 캐릭터가 어느 방향을 보든 적을 타격합니다.
  # 예: 클레릭의 힐/홀리 라이트, 마법사의 라이트닝 볼트 등.
  range_x: 400               # ↔️ 가로 스킬 범위 (픽셀)
  range_y: 170               # ↕️ 세로 스킬 범위 (픽셀)
  cooldown: 0.05             # TODO: 아직 자리만 차지함

health_monitor:
  # ❤️ 체력 모니터
  # HP/MP가 임계값 아래로 떨어지면 자동으로 포션을 사용합니다.
  # ⚠️ 펫이 이미 자동 회복을 처리한다면 비활성화해도 됩니다.
  enable: True             # ✅ 체력 모니터 활성/비활성
  force_heal: False        # 🛡️ 회복 우선 — HP 회복 전까지 공격 중단
  add_hp_percent: 50       # ❤️ HP가 이 비율 아래로 내려가면 HP 포션 사용 [0.0 ~ 1.0]
  add_mp_percent: 50       # 💙 MP가 이 비율 아래로 내려가면 MP 포션 사용 [0.0 ~ 1.0]
  add_hp_cooldown: 0.5     # 🕒 HP 포션 간 대기 시간(초). 포션 남용 방지
  add_mp_cooldown: 0.5     # 🕒 MP 포션 간 대기 시간(초). 포션 남용 방지
  fps_limit: 20            # 🚥 체력 모니터 스레드의 루프 속도
  return_home_if_no_potion: False      # ✅ 포션이 떨어지면 귀환 주문서 사용
  return_home_watch_dog_timeout: 3     # 🕒 HP가 "add_hp_percent" 이하임을 감지할 지속 시간

teleport:
  # 🌀 마법사 텔레포트
  # 마법사가 걷는 대신 텔레포트로 더 빠르게 이동하도록 합니다.
  # ⚠️ 아직 실험적 기능입니다! 활성화 시 예기치 못한 문제가 생길 수 있음.
  is_use_teleport_to_walk: False  # ✅ 걷는 대신 텔레포트 사용 (경로가 부정확해질 수 있음)
  cooldown: 1                     # ⏱️ 텔레포트 스킬 쿨다운 (초)
  cooldown_random: 0              # 🎲 쿨다운에 더할 랜덤 지터(초). 0~이 값 사이 무작위 추가 (매크로 감지 회피)
  keep_route_jump: True           # 🦘 루트가 점프/등반(jump,up,down)을 지시하면 텔레포트로 덮어쓰지 않고 점프/올라가기 수행

edge_teleport:
  # 🧙‍♂️ 가장자리 텔레포트
  # 캐릭터가 발판 끝에 다가가면 발판 중앙으로 텔레포트합니다.
  # 마법사가 아니라면 점프로 대체됩니다.
  enable: True                 # ✅ 기능 활성/비활성
  trigger_box_width: 20        # ↔️ 가장자리 감지 박스 너비 (픽셀)
  trigger_box_height: 10       # ↕️ 가장자리 감지 박스 높이 (픽셀)
  color_code: [255, 127, 127]  # 🎨 발판 가장자리를 나타내는 RGB 색상 코드

party_red_bar:
  # ❤️ 파티 빨간 바 감지
  # 게임 창에서 본인 캐릭터의 파티 빨간 바를 감지해 위치를 추정합니다.
  # 이 기능은 nametag.enable == False 일 때만 동작합니다.
  lower_red: [0, 60, 60]   # ❤️ HSV. 파티 체력 바의 어두운 빨강
  upper_red: [0, 100, 100] # ❤️ HSV. 파티 체력 바의 밝은 빨강
  offset: [20, 66]         # 🎯 파티 빨간 바 좌상단에서 캐릭터 중심까지의 오프셋
  create_party_button_cn_thres: 0.04   # 📏 파티 생성 버튼 매칭 임계값 (중국어)
  create_party_button_eng_thres: 0.04  # 📏 파티 생성 버튼 매칭 임계값 (영어)

nametag:
  # 🏷️ 네임택 인식
  # ⚠️ 이 기능은 deprecated. 파티 빨간 바 감지가 훨씬 안정적입니다.
  # 게임 창에서 본인 캐릭터의 네임택을 감지해 위치를 추정합니다.
  enable: False   # ✅ 파티 빨간 바 감지가 동작하지 않을 때만 'True'로 변경
  name: "example" # nametag/<name>.png 를 템플릿으로 로드
  mode: "grayscale"  # 🧪 네임택 매칭 방식. 선택지: "grayscale" "white_mask" "histogram_eq"
  offset: [-50, 30]  # 🎯 매칭된 네임택 좌상단에서 캐릭터 중심까지의 픽셀 오프셋
  diff_thres: 0.2     # 📏 매칭 임계값 [0.0 ~ 1.0]. 낮을수록 관대, 높을수록 엄격

  global_diff_thres: 0.2  # 🧠 전역 탐색 폴백
  # 차이값이 이 임계값보다 크면 전체 프레임을 탐색.
  # 작으면 마지막 위치 근처만 탐색하여 시간 절약.
  # 0.0 으로 설정하면 이 최적화 비활성화.

  split_width: 30  # ✂️ 각 세로 분할 너비(픽셀)
  # 사다리나 배경 오브젝트에 의한 가림을 줄이기 위해
  # 네임택을 세로로 분할해 작은 단위로 매칭함.

character:
  # 🧍 캐릭터
  # 캐릭터의 픽셀 크기.
  # ⚠️ monster_detect.mode 가 "template_free" 일 때만 사용됨.
  #    다른 검출 모드를 쓴다면 무시 가능.
  width: 100      # ↔️ 캐릭터 너비 (픽셀)
  height: 150     # ↕️ 캐릭터 높이 (픽셀)

monster_detect:
  # 🐌 몬스터 감지
  # 캐릭터 주변의 몬스터를 자동으로 감지합니다.
  # 감지 모드에 따라 몬스터를 찾는 방식이 달라집니다.
  # 연산 비용이 높은 순서:
  #   - "color"         (가장 정확하지만 가장 느림)
  #   - "grayscale"     (느림)
  #   - "contour_only"  (빠름, 외곽선 기반, 균형 좋음)
  #   - "template_free" (가장 가볍고 빠름. 단, 오탐 가능성 높음)
  # 💡 환경에 맞춰 여러 모드를 시도해 보세요.
  mode: "contour_only"         # 🧠 선택지: "color" "grayscale" "contour_only" "template_free"
  diff_thres: 0.8              # 📏 템플릿 매칭 차이 임계값 [0.0 ~ 1.0]. 낮을수록 엄격
  search_box_margin: 50        # ➕ 공격 박스 주변 몬스터 탐색 마진 (픽셀)
  contour_blur: 5              # 🌫️ 외곽선 스무딩용 가우시안 블러 커널 크기 ("contour_only" 모드에서 사용)
  with_enemy_hp_bar: True      # ❤️ 적 HP 바를 활용한 추가 감지 사용
  hp_bar_color: [71, 204, 64]  # 💚 적 HP 바 색상 (BGR 포맷)
  max_mob_area_trigger: 1500   # 📏 공격 범위와의 겹침 면적이 이 값 이상이어야 타깃으로 인정

channel_change:
  # 🔁 다른 유저가 감지되면 채널 자동 변경
  # "true": 다른 유저가 감지되는 즉시 채널 변경
  # "pixel": other_player_move_thres 픽셀만큼 다른 유저가 이동하면 채널 변경
  enable: False                # ✅
  mode: "pixel"                # 🧠 선택지: "true" "pixel"
  other_player_move_thres: 10  # 📏 "pixel" 모드에서만 동작

scheduled_channel_switching:
  # 채널 자동 전환 스케줄
  enable: False            # 기능 활성/비활성
  interval_seconds: 1800   # <interval_seconds> 초마다 채널 전환

ui_coords:
  # 🧭 UI 좌표
  # 게임 창 내 버튼/메뉴 좌표
  # 모든 좌표는 원본 창 크기 기준 (프레임 스크린샷에서 얻은 값)
  ui_y_start: 610                       # 📐 UI 시작 Y 좌표
  "menu": [1140, 730]                   # 📐 게임 창 UI의 메뉴 좌표
  "channel": [1140, 666]                # 📐 채널 버튼 좌표
  "random_channel": [877, 161]          # 📐 채널 선택 메뉴의 랜덤 채널 버튼
  "random_channel_confirm": [585, 420]  # 📐 채널 변경 확인 버튼
  "select_character": [888, 275]        # 📐 로그인 시 캐릭터 선택 버튼
  login_button_thres: 0.05              # 📏 게임 창의 로그인 버튼 감지 임계값
  login_button_top_left: [838, 317]     # 📐 로그인 버튼 탐색 영역 좌상단
  login_button_bottom_right: [940, 373] # 📐 로그인 버튼 탐색 영역 우하단

route:
  # 🧭 루트 추종
  # 캐릭터는 색상 코드 명령이 그려진 미리 정의된 루트 이미지(route*.png)를 따라 이동합니다.
  search_range: 10            # 🔍 플레이어 주변에서 가장 가까운 루트 색상을 탐색할 반경 (픽셀)
  jump_down_cooldown: 3.0     # ⏱️ 연속 하강 방지를 위한 '점프 다운' 쿨다운 (초)

  # 🎨 루트 내비게이션용 색상 코드(RGB) → 동작
  # "<좌-우 명령, 상-하 명령, 액션>"
  color_code:
    "255,0,0": "left none none"         # 🔴 빨강
    "0,0,255": "right none none"        # 🔵 파랑
    "255,127,0": "left none jump"       # 🟠 주황
    "0,255,255": "right none jump"      # 🟦 청록
    "127,255,0": "none down jump"       # 💚 라임
    "255,0,255": "none none jump"       # 💜 마젠타
    "0,255,127": "stop stop stop"       # 🟢 연두
    "255,255,0": "none none goal"       # 🟨 노랑
    "255,0,127": "none up teleport"     # 🌸 핑크
    "127,0,255": "none down teleport"   # 🟪 보라
    "0,127,0": "left none teleport"     # 🟩 진녹색
    "139,69,19": "right none teleport"  # 🟫 갈색

  # 🎨 상/하 이동용 색상 코드(RGB)
  color_code_up_down:
    "127,127,127": "none up none"       # ⚪ 회색
    "255,255,127": "none down none"     # 🟡 연노랑

watchdog:
  # 🐶 워치독
  # 캐릭터의 움직임을 감시합니다.
  # 일정 시간 같은 자리에 머무르면 워치독이 "짖어서"
  # 무작위 동작(`color_code`에 정의된)을 트리거해 끼임 상태를 해제합니다.
  # 또 하나의 기능은 마지막 공격 워치독으로, 너무 오래 공격하지 않으면
  # 끼인 상태로 간주해 복구 동작을 수행합니다.
  range: 10            # 🥶 이동 임계값(픽셀). 이보다 적게 움직이면 끼인 것으로 간주
  timeout: 10          # ⏱️ 시간 제한(초). 이 시간 동안 멈춰있으면 무작위 동작 트리거
  last_attack_timeout: 1200 # ⏳ 공격을 하지 않은 최대 허용 시간(초)
  last_attack_timeout_action: "change_channel" # 🧠 선택지: "go_home" "change_channel"

minimap:
  # 🗺️ 미니맵
  # 미니맵은 게임 창 좌상단에 나타납니다.
  # 월드 내 플레이어의 현재 위치를 추정하는 데 사용됩니다.
  player_color: [136, 255, 255]   # 🟡 미니맵의 노란 플레이어 점 BGR 값
  other_player_color: [0, 0, 255] # 🔴 미니맵의 빨간 타 유저 점 BGR 값
  debug_window_upscale: 4         # 🔍 루트 디버그 이미지의 확대 배율 (시각화 전용)
  offset: [0, 0]                  # 📐 글로벌 서버에서 플레이하는 게 아니라면 설정하지 말 것

patrol:
  # 🚶‍♂️ 순찰 모드
  # normal 처럼 미니맵 루트(route*.png)를 따라 이동하되, 몹 검출(템플릿 매칭) 대신
  # 주기적으로 공격합니다. 배경이 몹과 비슷해 템플릿 매칭이 불가한 맵에 적합.
  # ⚠️ normal 처럼 bot.map 과 minimaps/<map>/route*.png 가 필요합니다.
  range: [0.2, 0.8]               # (구) 좌우 왕복 경계 — 루트 기반으로 바뀌며 미사용
  turn_point_thres: 10            # (구) 회전 확정 프레임 수 — 미사용
  patrol_attack_interval: 2.5     # 🕒 주기 공격 간 시간 간격(초)
  patrol_attack_interval_random: 0  # 🎲 공격 간격에 더할 랜덤 지터(초). 0~이 값 사이 무작위 추가 (매크로 감지 회피)

route_recoder:
  # 🎥 루트 레코더
  # 루트 레코더는 `map.png` 와 `route*.png` 를 생성해 주는 독립 도구입니다.
  # 플레이어의 이동과 동작을 기록한 뒤 루트 맵 이미지로 저장합니다.
  blob_cooldown: 0.7        # ⏱️ 'jump', 'teleport' 같은 액션 기록 간 쿨다운(초)
                            #     이 액션들은 루트 맵 위에 "blob"으로 표시됨
  map_padding: 30           # 🖤 맵 가장자리 주변에 추가할 여백 (픽셀)

game_window:
  # 🪟 게임 창
  # 게임 창 설정에 대한 기본 정보
